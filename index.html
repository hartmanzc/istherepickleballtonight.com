<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Is there pickleball tonight?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20vh;
      font-size: 80px;
    }
  </style>
</head>
<body>
  <div id="answer">Loading...</div>

  <script>
    const today = new Date();
    const day = today.getDay(); 
    // 0 = Sunday, 1 = Monday, ... 4 = Thursday

    const answer = (day === 3) ? "Yes" : "No";

    document.getElementById("answer").textContent = answer;
  </script>
</body>
</html>
